<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allan Ortega | Art Gallery</title>
    <link rel="stylesheet" href="css/portfolio.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap">
    <style>
        /* Estilos específicos para a Galeria */
        .art-page { 
            padding-top: 120px; 
            background: #000; 
            min-height: 100vh; 
        }

        .img-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            max-height: 100%;
        }

        .image-caption-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px;
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid var(--primary);
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }
        
        /* --- Grid de Galeria Estilo ArtStation --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-flow: dense; 
            gap: 15px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .art-item {
            position: relative;
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #111;
            transition: 0.3s ease;
        }

        .art-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .art-item:hover img {
            transform: scale(1.05);
        }

        .art-item:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(129, 254, 78, 0.2);
        }

        /* --- Itens em Destaque (Featured) --- */
        .art-item.featured {
            grid-column: span 2;
            grid-row: span 2;
        }

        .featured-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary);
            color: black;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 10;
            letter-spacing: 1px;
        }

        /* --- Modal e Carrossel --- */
        .art-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none; 
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .modal-content {
            display: flex;
            max-width: 1200px;
            width: 95%;
            background: #0a0a0a;
            border: 1px solid #222;
            height: 80vh;
        }

        .modal-img-container {
            flex: 2;
            position: relative; /* Necessário para os botões absolutos */
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .modal-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: var(--primary);
            border: 1px solid #333;
            padding: 15px 20px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .carousel-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }

        .modal-info {
            flex: 1;
            padding: 40px;
            border-left: 1px solid #222;
            overflow-y: auto;
        }

        .modal-info h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .modal-info p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            z-index: 2100;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .modal-content { flex-direction: column; height: auto; max-height: 90vh; }
            .modal-info { border-left: none; border-top: 1px solid #222; padding: 20px; }
            .carousel-btn { padding: 10px 15px; font-size: 1rem; }
        }

        @media (max-width: 768px) {
            .art-item.featured {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
    </style>
</head>
<body class="art-page">

    <nav class="minimal-nav">
        <div class="initials">Dev_AO<span>.</span></div>
        <ul>
            <li><a href="portfolio.html">Back to Portfolio</a></li>
        </ul>
    </nav>

    <main>
        <div class="gallery-grid" id="artGallery">
            </div>
    </main>

    <div class="art-modal" id="artModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <div class="modal-img-container">
                <button class="carousel-btn prev" id="prevArtImg" onclick="changeArtImage(-1)">&#10094;</button>
                
                <div class="img-wrapper">
                    <img src="" id="modalImg" alt="Gallery Image">
                    <p id="imageCaption" class="image-caption-overlay"></p>
                </div>

                <button class="carousel-btn next" id="nextArtImg" onclick="changeArtImage(1)">&#10095;</button>
            </div>
            <div class="modal-info">
                <h2 id="modalTitle">Project Title</h2>
                <p id="modalDesc">Project description goes here...</p>
            </div>
        </div>
    </div>

    <script src="javascript/art-gallery.js"></script>
</body>
</html>
